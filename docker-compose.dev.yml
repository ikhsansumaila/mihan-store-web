services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: mihanstore_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - ./backend:/app
    networks:
      - mihanstore-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mihanstore_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
      - WDS_SOCKET_PORT=0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mihanstore-net

networks:
  mihanstore-net:
    driver: bridge