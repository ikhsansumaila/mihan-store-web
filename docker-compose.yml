services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mihanstore_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    networks:
      - mihanstore-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mihanstore_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
    networks:
      - mihanstore-net

networks:
  mihanstore-net:
    driver: bridge
